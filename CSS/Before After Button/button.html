<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Effets</title>

    <link rel="stylesheet" href="CSS/style.css">

</head>
<body>

    <h1>Background Transitions</h1>
    <button class="btn btn1"><p>Fade</p></button>
    <button class="btn btn2"><p>Back Pulse</p></button>
    <button class="btn btn3"><p>Sweep To Right</p></button>
    <button class="btn btn4"><p>Sweep To Left</p></button>
    <button class="btn btn5"><p>Sweep To Bottom</p></button>
    <button class="btn btn6"><p>Sweep To Top</p></button>
    <button class="btn btn7"><p>Bounce To Right</p></button>
    <button class="btn btn8"><p>Bounce To Left</p></button>
    <button class="btn btn9"><p>Bounce To Bottom</p></button>
    <button class="btn btn10"><p>Bounce To Top</p></button>
    <button class="btn btn11"><p>Redial Out</p></button>
    <button class="btn btn12"><p>Redial In</p></button>
    <button class="btn btn13"><p>Rectangel In</p></button>
    <button class="btn btn14"><p>Rectangel Out</p></button>
    <button class="btn btn15"><p>Shutter In Horizontal</p></button>
    <button class="btn btn16"><p>Shutter Out Horizontal</p></button>
    <button class="btn btn17"><p>Shutter In Vertical</p></button>
    <button class="btn btn18"><p>Shutter Out Vertical</p></button>

    <h1>Border Transitions</h1>
    <button class="btn btn19"><p class="color">Border Fade</p></button>
    <button class="btn btn20"><p class="color">Hollow</p></button>
    <button class="btn btn21"><p class="color">Trim</p></button>
    <button class="btn btn22"><p class="color">Ripple Out</p></button>
    <button class="btn btn23"><p class="color">Ripple In</p></button>
    <button class="btn btn24"><p class="color">Outline Out</p></button>
    <button class="btn btn25"><p class="color">Outline In</p></button>
    <button class="btn btn26"><p class="color">Round Corner</p></button>
    <button class="btn btn27"><p class="color">Underline From Left</p></button>
    <button class="btn btn28"><p class="color">Underline From Center</p></button>
    <button class="btn btn29"><p class="color">Underline From Right</p></button>
    <button class="btn btn30"><p class="color">Reveal</p></button>
    <button class="btn btn31"><p class="color">Underline Reveal</p></button>
    <button class="btn btn32"><p class="color">Overline Reveal</p></button>
    <button class="btn btn33"><p class="color">Overline From Left</p></button>
    <button class="btn btn34"><p class="color">Overline From Center</p></button>
    <button class="btn btn35"><p class="color">Overline From Right</p></button>

    <h1>Speech Bubbles</h1>
    <button class="btn btn36"><p class="color">Bubble Top</p></button>
    <button class="btn btn37"><p class="color">Bubble Right</p></button>
    <button class="btn btn38"><p class="color">Bubble Bottom</p></button>
    <button class="btn btn39"><p class="color">Bubble Left</p></button>
    <button class="btn btn40"><p class="color">Bubble Float Top</p></button>
    <button class="btn btn41"><p class="color">Bubble Float Right</p></button>
    <button class="btn btn42"><p class="color">Bubble Float Bottom</p></button>
    <button class="btn btn43"><p class="color">Bubble Float Left</p></button>
    
</body>
</html>
