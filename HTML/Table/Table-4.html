<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Table-4</title>
</head>
<body>

	<table align="center" border="3">
		<caption>HTML Table Examples</caption>
		<tr>
			<th colspan="4">Student Name</th>
			<th colspan="3">Labs</th>
			<th rowspan="2">Avg</th>
		</tr>
		<tr>
			<th colspan="2">First</th>
			<th colspan="2">Last</th>
			<th>Lab-1</th>
			<th>Lab-2</th>
			<th>Lab-3</th>
		</tr>
		<tr>
			<td colspan="2">Sol</td>
			<td colspan="2">Rosenberg</td>
			<td>100</td>
			<td>100</td>
			<td>100</td>
			<td>100.0</td>
		</tr>
		<tr>
			<td colspan="2">Frank</td>
			<td colspan="2">Rizzo</td>
			<td>50</td>
			<td>60</td>
			<td>90</td>
			<td>66.6</td>
		</tr>
		<tr>
			<td colspan="2">Ali</td>
			<td colspan="2">Kam</td>
			<td>90</td>
			<td>80</td>
			<td>60</td>
			<td>76.6</td>
		</tr>
		<tr>
			<th rowspan="2" colspan="2">Summary</th>
			<th colspan="2">Avg</th>
			<td>80.0</td>
			<td>80.0</td>
			<td>83.3</td>
			<td>81.1</td>
		</tr>
		<tr>
			<th colspan="2">Min</th>
			<td>50</td>
			<td>60</td>
			<td>60</td>
			<td>66.6</td>
		</tr>
	</table>

</body>
</html>
