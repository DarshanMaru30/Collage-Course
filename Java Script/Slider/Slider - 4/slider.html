<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Slider</title>

	<script type="text/javascript">
		
		var temp = 0;

		function slider()
		{
			var img = document.getElementsByClassName('img');

			for(i = 0; i < img.length; i++)
			{
					img[i].style.display = "none";
			}
			img[temp].style.display = "block";
		}

		function img1(x)
		{
			temp = x;
			slider();
		}
	
		window.onload = function()
		{
			slider();
		}

	</script>

	<style>
			
		.box
		{
			margin: auto;
			width: 800px;
		}
		.btn
		{
			font-size: 20px;
			cursor: pointer;
		}		
		img
		{
			object-fit: cover;
		}
		.main
		{
			width: 450px;
			margin: 20px auto;
		}
		.main img
		{
			height: 40px;
			width: 60px;
			margin: 2px;
			object-fit: cover;
		}

	</style>

</head>
<body>

	<div class="box">
		<img src="Images/1.jpg" height="500px" width="100%" class="img">
		<img src="Images/2.jpg" height="500px" width="100%" class="img">
		<img src="Images/3.jpg" height="500px" width="100%" class="img">
		<img src="Images/4.jpg" height="500px" width="100%" class="img">
		<img src="Images/5.jpg" height="500px" width="100%" class="img">
		<img src="Images/6.jpg" height="500px" width="100%" class="img">
	</div>

	<div class="main">
		<span class="doted"><img src="Images/1.jpg" onclick="img1(0)" id="small"></span>		
		<span class="doted"><img src="Images/2.jpg" onclick="img1(1)" id="small"></span>
		<span class="doted"><img src="Images/3.jpg" onclick="img1(2)" id="small"></span>
		<span class="doted"><img src="Images/4.jpg" onclick="img1(3)" id="small"></span>
		<span class="doted"><img src="Images/5.jpg" onclick="img1(4)" id="small"></span>
		<span class="doted"><img src="Images/6.jpg" onclick="img1(5)" id="small"></span>
	</div>

</body>
</html>
