<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
      <style>

        .slideshow 
        {
          max-width: 1000px;
          position: relative;
          margin: auto;
        }

        .dot 
        {
          height: 15px;
          width: 15px;
          margin: 0 2px;
          background-color: #bbb;
          border-radius: 50%;
          display: inline-block;
          transition: background-color 0.6s ease;
        }

        .active 
        {
          background-color: #717171;
        }
      </style>
</head>
<body>


<div class="slideshow">

  <img class="img" src="Images/1.jpg" height="500px" style="width:100%">
  <img class="img" src="Images/2.jpg" height="500px" style="width:100%">
  <img class="img" src="Images/3.jpg" height="500px" style="width:100%">
  <img class="img" src="Images/4.jpg" height="500px" style="width:100%">
  <img class="img" src="Images/4.jpg" height="500px" style="width:100%">
  <img class="img" src="Images/5.jpg" height="500px" style="width:100%">
  <img class="img" src="Images/6.jpg" height="500px" style="width:100%">

</div>
<br>

    <script>
        var temp = 0;
        showSlides();

        function showSlides() 
        {
          let i;
          var img = document.getElementsByClassName("img");
          for (i = 0; i < img.length; i++) 
          {
            img[i].style.display = "none";  
          }
          temp++;
          if (temp > img.length) 
          {
            temp = 1
          }    
          img[temp].style.display = "block";  
          setTimeout(showSlides, 1000); 
        }
    </script>

</body>
</html>
