<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
      <style>

        .slideshow 
        {
          max-width: 1000px;
          position: relative;
          margin: auto;
        }

        .dot 
        {
          height: 15px;
          width: 15px;
          margin: 0 2px;
          background-color: #bbb;
          border-radius: 50%;
          display: inline-block;
          transition: background-color 0.6s ease;
        }

        .active 
        {
          background-color: #717171;
        }
      </style>
</head>
<body>


<div class="slideshow">

  <img class="mySlides fade" src="Images/1.jpg" height="500px" style="width:100%">
  <img class="mySlides fade" src="Images/2.jpg" height="500px" style="width:100%">
  <img class="mySlides fade" src="Images/3.jpg" height="500px" style="width:100%">
  <img class="mySlides fade" src="Images/4.jpg" height="500px" style="width:100%">
  <img class="mySlides fade" src="Images/5.jpg" height="500px" style="width:100%">
  <img class="mySlides fade" src="Images/6.jpg" height="500px" style="width:100%">

</div>
<br>

<div style="text-align:center">
  <span class="dot" onclick="get(0)"></span> 
  <span class="dot" onclick="get(1)"></span> 
  <span class="dot" onclick="get(2)"></span> 
  <span class="dot" onclick="get(3)"></span> 
  <span class="dot" onclick="get(4)"></span> 
  <span class="dot" onclick="get(5)"></span> 
</div>

    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() 
        {
          let i;
          let slides = document.getElementsByClassName("mySlides");
          let dots = document.getElementsByClassName("dot");
          for (i = 0; i < slides.length; i++) 
          {
            slides[i].style.display = "none";  
          }
          slideIndex++;
          for (i = 0; i < dots.length; i++) 
          {
            dots[i].className = dots[i].className.replace(" active", "");
          }
          slides[slideIndex-1].style.display = "block";  
          dots[slideIndex-1].className += " active";
        }
        function get(x)
        {
          slideIndex = x;
          showSlides();
        }
    </script>

</body>
</html>
