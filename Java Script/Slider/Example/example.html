<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Simple Slider</title>

	<script type="text/javascript">
		
		var temp = 0;
		function sliderdata() 
		{
			var img = document.getElementsByClassName('img');

			for (var i = 0 ; i < img.length ; i++) 
			{
				img[i].style.display = "none";
			}
			img[temp].style.display = "block";
		}	

		function prev()
		{
			temp--;
			sliderdata();
		}
		function next()
		{
			temp++;
			sliderdata();
		}
		
		window.onload = function()
		{ 
			sliderdata();
		}	

	</script>

</head>
<body>

	<img src="Images/1.jpg" height="600px" class="img" width="100%">
	<img src="Images/2.jpg" height="600px" class="img" width="100%">
	<img src="Images/3.jpg" height="600px" class="img" width="100%">
	<img src="Images/4.jpg" height="600px" class="img" width="100%">
	<img src="Images/5.jpg" height="600px" class="img" width="100%">
	<img src="Images/6.jpg" height="600px" class="img" width="100%">

	<input type="button" name="" value="Prev" id="prev" onclick="prev()">
	<input type="button" name="" value="Next" id="next" onclick="next()">
</body>
</html>
