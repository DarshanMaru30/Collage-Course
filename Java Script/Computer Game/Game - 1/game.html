<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Computer Game</title>

	<style type="text/css">


		body
		{
			background: #56BAEC;
		}
		.box
		{
			width: 400px;
			margin: 100px auto;
		}
		.btn
		{
			border-radius: 5px;
			width: 135px;
			height: 135px;
			background: white;
			font-size: 60px;
			color: #56BAEC;
			font-weight: bolder;
			border: none;
		}
		.container
		{
			display: inline-grid;
			grid-template-columns: auto auto auto;
			gap: 7px;
		}
		h1
		{
			color: white;
			font-size: 50px;
			text-align: center;
		}
		.rst
		{
			background: white;
			color: #56BAEC;
			display: inline-block;
			width: 100px;
			text-align: center;
			padding: 15px 20px;
			font-size: 30px;
			border-radius: 5px;
			cursor: pointer;
			font-weight: bolder;
			margin: 0px 140px;
		}
		#txt
		{
			color: white;
			font-weight: bolder;
			font-size: 35px;
			text-align: center;
		}

	</style>

	<script type="text/javascript">
		
		var arr = ['','','','','','','','',''];
		var temp = 0;
		var a=true
		function getdata(X)
		{
			arr[X] = "X";
			if(a==true)
			{
				document.getElementById('b'+X).value = 'X';
			}
			randomdata();
		}
		function randomdata()
		{
			
			if(temp<4 && a==true)
			{
				while(true)
				{
					var val = Math.floor(Math.random()*9);
					if(arr[val] == '')
					{
						temp++;
						arr[val]="O";
						document.getElementById('b'+val).value = 'O';
						break;
					}
				}
			}
			setdata();
			console.log(arr);
			console.log(temp);
		}
		function setdata() 
		{
			var b0 = document.getElementById('b0').value;
			var b1 = document.getElementById('b1').value;
			var b2 = document.getElementById('b2').value;
			var b3 = document.getElementById('b3').value;
			var b4 = document.getElementById('b4').value;
			var b5 = document.getElementById('b5').value;
			var b6 = document.getElementById('b6').value;
			var b7 = document.getElementById('b7').value;
			var b8 = document.getElementById('b8').value;

			win(b0,b1,b2,'X');
			win(b3,b4,b5,'X');
			win(b6,b7,b8,'X');
			win(b0,b3,b6,'X');
			win(b1,b4,b7,'X');
			win(b2,b5,b8,'X');
			win(b0,b4,b8,'X');
			win(b2,b4,b6,'X');

			win(b0,b1,b2,'O');
			win(b3,b4,b5,'O');
			win(b6,b7,b8,'O');
			win(b0,b3,b6,'O');
			win(b1,b4,b7,'O');
			win(b2,b5,b8,'O');	
			win(b0,b4,b8,'O');
			win(b2,b4,b6,'O');
		}
		function win(p0,p1,p2,sign)
		{
			if(p0==sign && p1==sign && p2==sign)
			{
				document.getElementById('txt').innerHTML = sign+"  IS WON";
				a=true;
			}

		}
		function restart()
		{
			for (var i = 0; i < 9; i++) 
			{	
				var btn = document.getElementById('b'+i);
				btn.value = '';
			}
			a = false;
			temp = 1;
			document.getElementById('txt').innerHTML = '';

		}

	</script>

</head>
<body>

	<div class="box">
		<h1>Tic - Tak - Toe</h1>
		<div class="container">
			<!-- <div class="btn" id="b0" onclick="getdata('0')"></div>
			<div class="btn" id="b1" onclick="getdata('1')"></div>
			<div class="btn" id="b2" onclick="getdata('2')"></div>
			<div class="btn" id="b3" onclick="getdata('3')"></div>
			<div class="btn" id="b4" onclick="getdata('4')"></div>
			<div class="btn" id="b5" onclick="getdata('5')"></div>
			<div class="btn" id="b6" onclick="getdata('6')"></div>
			<div class="btn" id="b7" onclick="getdata('7')"></div>
			<div class="btn" id="b8" onclick="getdata('8')"></div> -->
			<input type="button" class="btn" name="" id="b0" onclick="getdata('0')">
			<input type="button" class="btn" name="" id="b1" onclick="getdata('1')">
			<input type="button" class="btn" name="" id="b2" onclick="getdata('2')">
			<input type="button" class="btn" name="" id="b3" onclick="getdata('3')">
			<input type="button" class="btn" name="" id="b4" onclick="getdata('4')">
			<input type="button" class="btn" name="" id="b5" onclick="getdata('5')">
			<input type="button" class="btn" name="" id="b6" onclick="getdata('6')">
			<input type="button" class="btn" name="" id="b7" onclick="getdata('7')">
			<input type="button" class="btn" name="" id="b8" onclick="getdata('8')">
		</div>
		<p id="txt">Player X's Turn</p>
		<div class="rst" onclick="restart()">Restart</div>
	</div>
</body>
</html>
