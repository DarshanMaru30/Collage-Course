<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calculation</title>

	<script type="text/javascript">
		
		function sum()
		{	
			var x = document.getElementById('no1').value;
			var y = document.getElementById('no2').value;

			var z = parseInt(x) + parseInt(y);

			document.getElementById('ans').value = z;
		}

		function sub()
		{
			var x = document.getElementById('no1').value;
			var y = document.getElementById('no2').value;

			var z = parseInt(x) - parseInt(y);

			document.getElementById('ans').value = z;
		}

		function mul()
		{
			var x = document.getElementById('no1').value;
			var y = document.getElementById('no2').value;

			var z = parseInt(x) * parseInt(y);

			document.getElementById('ans').value = z;
		}

		function div()
		{
			var x = document.getElementById('no1').value;
			var y = document.getElementById('no2').value;

			var z = parseInt(x) / parseInt(y);

			document.getElementById('ans').value = z;
		}

	</script>

</head>
<body style="text-align: center;">

	No-1:- <input type="text" name="" id="no1"><br><br>
	No-2:- <input type="text" name="" id="no2"><br><br>

	<input type="button" name=""  value="Sum" onclick="sum()">
	<input type="button" name=""  value="Sub" onclick="sub()">
	<input type="button" name=""  value="Mul" onclick="mul()">
	<input type="button" name=""  value="Div" onclick="div()">

	<br><br>Ans:- <input type="text" readonly name="" id="ans">

</body>
</html>
