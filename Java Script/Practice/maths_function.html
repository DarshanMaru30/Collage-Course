<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>math function</title>
	<script type="text/javascript">
		

	
		for(i=0;i<=10;i++)
		{
			document.write("<br>");
			document.write(Math.abs(i));
		}

		document.write("<br>",Math.ceil(3.6));

		document.write("<br>",Math.floor(3.6));

		document.write("<br>",Math.pow(2,4));

		document.write("<br>",Math.random());

		document.write("<br>",Math.min(2,3,4,5,6,7,7));

		document.write("<br>",Math.max(2,3,4,5,6,7,7));


		document.write("<br>",Math.round(2.522222222));






	</script>
</head>
<body>

</body>
</html>
