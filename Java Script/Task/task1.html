<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task</title>

    <script>

        function data() {
            var nm = document.getElementById('name').value;
            // alert(nm);
            var ch = nm.length;
            var chr = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            var le = chr.length;
            let result = '';
            let last = '';
            for(i = 0; i < 16-ch; i++)
            {
                result += chr.charAt(Math.floor(Math.random()*le));
            }
            last = result.concat(nm);
            // alert(last);
            // document.write(last);
            document.getElementById('text').innerHTML = last;

            const slp = last.split('');
            console.log(slp);
        }

    </script>

</head>
<body>

    Enter Name : <input type="text" name="name" id="name">
    <input type="button" name="button" value="submit" onclick="data()">
    <p id="text"></p>
</body>
</html>
