<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<script type="text/javascript">
		
		var unit = 23,bill;

		if(unit<0)
		{
			bill = unit * 0.50
		}
		else if(unit<150)
		{
			bill = 25 + ((unit - 50)*0.75);
		}
		else if(unit<250)
		{
			bill = 120 + ((unit - 150)*1.20);
		}
		else
		{
			bill = 220 + ((unit - 250)*1.50);
		}

		var charge = bill * 0.2;
		var totalbill = bill + charge;

		document.write("<br>Bill = "+bill);
		document.write("<br>Charges = "+charge);
		document.write("<br>Total Bill = "+totalbill);

	</script>

</head>
<body>

</body>
</html>
