<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<script type="text/javascript">
		
		var a = 5,i,cnt = 0;

		document.write("A = "+a);

		for(i=1;i<=a;i++)
		{
			if(a%i==0)
			{
				cnt++;
			}
		}

		if(cnt==2)
		{
			document.write("<br>Prime")
		}
		else
		{
			document.write("<br>Not")
		}

	</script>

</head>
<body>

</body>
</html>
