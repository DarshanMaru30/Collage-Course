<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<script type="text/javascript">
		
		var a = 1,n = 10,sum = 0;

		do
		{
			sum = sum+a;
			document.write("<br>"+a);
			a++;
		}
		while(a<=n);

		document.write("<br>Sum = "+sum);

	</script>

</head>
