<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<script type="text/javascript">
		
		var n1 = 10,n2 = 10,n3 = 15;t = 0;

		do
		{
			if(n1%n3==0)
			{
				t = t+n1;
				document.write("<br>Val = "+n1);
			}
			n1++;
		}
		while(n1<=n2);

		document.write("<br>Sum = "+t);

	</script>

</head>
