	<title></title>

	<script type="text/javascript">
		
		var a = 10,b = 25;

		if(a<b)
		{
			while(a<=b)
			{
				if(a%2!=0)
				{
					document.write("<br>"+a);
				}
				a++;
			}
		}
		else
		{
			if(b<=a)
			{
				if(b%2==0)
				{
					document.write("<br>"+b);
				}
				b++;
			}
		}

	</script>
