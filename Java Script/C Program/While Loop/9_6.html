	<script type="text/javascript">
		
		var n=5,f=1,i=1;

		while(n>0)
		{
			if(i<=n)
			{
				f = f * n;
			document.write("<br>"+n);
			n--;
			}
		}

		document.write("<br> factorial = "+f);

	</script>
