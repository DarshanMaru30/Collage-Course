<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<script type="text/javascript">
		
		var n=1,rev=0,t;

		while(n>0)
		{
			t = n%10;
			rev = rev*10+t;
			n = n/10;
		}

		document.write("<br>Reverse = "+rev);

	</script>

</head>
