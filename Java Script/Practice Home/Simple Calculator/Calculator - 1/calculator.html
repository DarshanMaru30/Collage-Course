<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calculator</title>

	<style type="text/css">
		*
		{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body
		{
			height: 92vh;
			background-image: linear-gradient(45deg , #E5818D , #D1BF91);
			background-repeat: no-repeat;
			background-position: fixed;
			background-size: cover;
		}
		input
		{
			width: 371px;
			height: 100px;
			background: #372624;
			text-align: right;
			color: white;
			font-size: 35px;
		}
		.box
		{
			width: 370px;
			margin: 50px auto;
		}
		.key
		{
			font-size: 30px;
			height: 87px;
			width: 92.5px;
			margin: 0px -2px;
		}
		.blue
		{
			color: #ACC367;
			background: #9A228C;
			width: 185px;
		}
	</style>

	<script>
			
		var fval , lval , cal;	
		function getdata(n) 
		{
			var x = document.getElementById('disp1').value += n;
		}
		function nul()
		{
			document.getElementById('disp1').value = '';
		}
		function remove()
		{
			var s = document.getElementById('disp1').value;
			var x = s.substring(0,s.length-1);
			document.getElementById('disp1').value = x;
		}

		function sum(a)
		{
			fval = document.getElementById('disp1').value;
			cal = a;
			document.getElementById('disp1').value = "";
		}
		function sub(b)
		{
			fval = document.getElementById('disp1').value;
			cal = b;
			document.getElementById('disp1').value = "";
		}
		function mul(c)
		{
			fval = document.getElementById('disp1').value;
			cal = c;
			document.getElementById('disp1').value = "";
		}
		function div(d)
		{
			fval = document.getElementById('disp1').value;
			cal = d;
			document.getElementById('disp1').value = "";
		}
		function sign()
		{
			lval = document.getElementById('disp1').value;
			document.getElementById('disp1').value = "";

			if(cal==10)
			{
				var data = parseFloat(fval) / parseFloat(lval);
			}
			else if(cal==11)
			{
				var data = parseFloat(fval) * parseFloat(lval);
			}
			else if(cal==12)
			{
				var data = parseFloat(fval) + parseFloat(lval);
			}
			else if(cal==13)
			{
				var data = parseFloat(fval) - parseFloat(lval);
			}
			document.getElementById('disp1').value = data;
		}

	</script>

</head>
<body>

	<div class="box">
		<div class="disp">
			<input type="text" name="" readonly id="disp1">
		</div>
		<div class="keybord">
			<div class="keypad">
				<button class="key blue" onclick="remove()">AC</button>
				<button class="key" onclick="nul()">DEL</button>
				<button class="key" onclick="div(10)">/</button>
			</div>
			<div class="keypad">
				<button class="key" onclick="getdata('1')">1</button>
				<button class="key" onclick="getdata('2')">2</button>
				<button class="key" onclick="getdata('3')">3</button>
				<button class="key" onclick="mul(11)">*</button>
			</div>
			<div class="keypad">
				<button class="key" onclick="getdata('4')">4</button>
				<button class="key" onclick="getdata('5')">5</button>
				<button class="key" onclick="getdata('6')">6</button>
				<button class="key" onclick="sum(12)">+</button>
			</div>
			<div class="keypad">
				<button class="key" onclick="getdata('7')">7</button>
				<button class="key" onclick="getdata('8')">8</button>
				<button class="key" onclick="getdata('9')">9</button>
				<button class="key" onclick="sub(13)">-</button>
			</div>
			<div class="keypad">
				<button class="key" onclick="getdata('.')">.</button>
				<button class="key" onclick="getdata('0')">0</button>
				<button class="key blue" onclick="sign()">=</button>
			</div>
		</div>
	</div>

</body>
</html>
